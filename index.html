<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Board</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f0ede8;
        min-height: 100vh;
        padding: 1.5rem;
      }
      #root { max-width: 1100px; margin: 0 auto; }

      input, select, textarea {
        font-family: inherit;
        font-size: 13px;
        border-radius: 8px;
        border: 1px solid rgba(120,113,108,0.25);
        background: rgba(255,255,255,0.95);
        color: #2c2825;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus, select:focus, textarea:focus {
        border-color: rgba(120,113,108,0.5);
        box-shadow: 0 0 0 2px rgba(120,113,108,0.1);
      }
      button { font-family: inherit; }

      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f2ee;
        --color-background-tertiary: #f0ede8;
        --color-text-primary: #2c2825;
        --color-text-secondary: #6b6560;
        --color-text-tertiary: #a39e99;
        --color-border-tertiary: rgba(120,113,108,0.15);
        --color-border-secondary: rgba(120,113,108,0.28);
        --color-border-primary: rgba(120,113,108,0.45);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
